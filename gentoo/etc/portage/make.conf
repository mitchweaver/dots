#=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/

# ======================================================
# PORTAGE SETTINGS
# ======================================================
EMERGE_DEFAULT_OPTS="--ask --ask-enter-invalid --verbose --alphabetical --alert y --read-news n --fuzzy-search y --color y --backtrack=24"
ACCEPT_LICENSE="-* @FREE @BINARY-REDISTRIBUTABLE GPL-2.0 GPL-3.0 OSL-3.0 CC-BY-SA-* MIT NVIDIA-CUDA"
GENTOO_MIRRORS="https://distfiles.gentoo.org"
PORTDIR=/var/db/repos/gentoo
DISTDIR=/var/cache/distfiles
PKGDIR=/var/cache/binpkgs
PORTAGE_LOG_DIR=/var/log/portage
PORTAGE_NICENESS=19
PORTAGE_SCHEDULING_POLICY="idle"
NTHREADS=auto
LC_MESSAGES=C
FONT_TYPES="otf ttf"
L10N="en-US en l10n_en-US"

# ======================================================
# PORTAGE FEATURES
# ======================================================
FEATURES=""
# performance / (note fail-clean is to wipe build after failure to clear tmpfs)
FEATURES="$FEATURES fail-clean parallel-fetch parallel-install unknown-features-warn"
# security / sandboxing -- note: userpriv can break some ebuilds
FEATURES="$FEATURES strict network-sandbox ipc-sandbox pid-sandbox userpriv usersandbox usersync userfetch"
# logs / debug info
FEATURES="$FEATURES compress-build-logs compressdebug nodoc noinfo dedupdebug"
# disables
FEATURES="$FEATURES -news -ccache -distcc"

# ======================================================
# SLOTTING
# ======================================================
##########LLVM_SLOT="21 22"
##########PYTHON_TARGETS="python3_13"
LUA_SINGLE_TARGET="lua5-1"

# ======================================================
# BUGS / WORKAROUNDS
# ======================================================

# ======================================================
# COMPILER FLAGS
# ======================================================
source /etc/portage/make.conf.performance
source /etc/portage/make.conf.hardening
source /etc/portage/make.conf.lto

COMMON_FLAGS="$COMMON_FLAGS $COMMON_FLAGS_PERFORMANCE $COMMON_FLAGS_HARDENING $COMMON_FLAGS_LTO"
CFLAGS="${COMMON_FLAGS} $CFLAGS -w"
CPPFLAGS="${COMMON_FLAGS} $CPPFLAGS"
CXXFLAGS="${COMMON_FLAGS} $CXXFLAGS"
FCFLAGS="${COMMON_FLAGS} $FCFLAGS"
FFLAGS="${COMMON_FLAGS} $FFLAGS"
RUSTFLAGS="-C target-cpu=native -C opt-level=3 -C link-arg=-Wl,-z,pack-relative-relocs"

# use mold linker
# see /etc/portage/env/no-mold.conf for packages that break
# (need commented out to merge mold first obviously)
LDFLAGS="-fuse-ld=mold -Wl,-O3 -Wl,--as-needed -Wl,--hash-style=gnu"

# ======================================================
# MACHINE SPECIFIC
# ======================================================
source /etc/portage/make.conf.xps
##########source /etc/portage/make.conf.surface
##########source /etc/portage/make.conf.thinkpad
##########source /etc/portage/make.conf.desktop

# ======================================================
# ARCHITECTURE SPECIFIC
# ======================================================
source /etc/portage/make.conf.intel
source /etc/portage/make.conf.performance-amd64
source /etc/portage/make.conf.hardening-amd64

# ======================================================
# LIBC SPECIFIC
# ======================================================
source /etc/portage/make.conf.hardening-glibc

# ======================================================
# USE FLAGS
# ======================================================
USE="\
# =/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=
# MACHINE SPECIFIC USE FLAGS
# =/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=
$CPU_USE_FLAGS \
$GPU_USE_FLAGS \
# =/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=
# Positive Use Flags
# =/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=
# DESKTOP
X wayland bluetooth alsa pipewire screencast man \
libnotify fontconfig icu appindicator cups hwaccel \
gnome-keyring \
# LTO / PGO
lto pgo graphite \
# GRAPHICS
vulkan opengl egl \
# SECURITY
hardened cet seccomp caps filecaps \
# openrc/no-systemd
udev dbus elogind \
# MINIMAL / OPEN ALTERNATIVES
libedit openmp openipmi \
# CODECS
gif png jpeg jpeg2k tiff svg webp mp3 flac vorbis ogg \
vpx theora v4l v4l2 pdf avif vaapi vdpau opus epub mobi \
pdf x264 x265 openh264 openh265 \
# COMPRESSION
zstd lz4 lzma \
# LANGUAGE VERSIONS
lua_single_target_lua5-1 \
# GENTOO_SPECIFIC
branding \
# FONTS
otf font_types_otf nls cjk freetype \
# SPEED UP COMPILE
jumbo-build \
# =/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=
# Negative Use Flags
# =/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=/=
# DEFAULT NO X86
-abi_x86_32 \
# SYSTEMD / CRAP WARE
-systemd -resolvconf -polkit -policykit -pulseaudio -sndio \
-networkmanager -flatpak -snap \
# GNOME
-gnome -introspection -cairo -eds -vala -libadwaita \
-adwaita -gnome-shell -gnome-online-accounts -goa -nautilus -gnome-terminal \
# NEGATIVE KDE
-kf6compat -kwallet -kaccounts -telepathy -semantic-desktop \
-webengine -activities -kate -phonon \
-legacy-systray -dolphin \
# QT CRAP
-qt5 -qt6 -qml -assistant -designer \
# OLD X11 STUFF DONT NEED ON WAYLAND
-xinerama -xrandr -xnest -xephyr -xvfb -xcomposite -xscreensaver \
# EXTRA DOCS
-doc -gtk-doc -docs -handbook -examples -extras -test -rdoc -help \
# JIT
# security tradeoff as breaks some memory protections from gentoo hardened
# see: https://packages.gentoo.org/useflags/jit
-jit -luajit \
# ONLY ENABLE ON PER-PACKAGE BASIS
-samba -nfs -sftp -truetype -xml -docx -xmp -widgets
# NEGATIVE FONT CRAP
-ttf -font_types-ttf -bdf -autohint -harfbuzz \
# STUFF I DONT CARE ABOUT
-bindist -profile -lua -vala -sysprof -colord \
-objc -objc++ -objc-gc -xen -vmware -jack -jack-net -jack-sdk -jack-client \
-ibus -sendto -miners -calendar -alternate-calendar -ccache \
-qmi -mbim -qrtr -crda -vlc -plymouth -webdriver -ocr \
-lcms -rar -passwdqc \
# NETWORKING STUFF I DONT USE
-ads -ceph -wext -ppp -concheck -cluster -glusterfs \
-websocket -websockets -webdav \
# BIOMETRICS IS STUPID
-fprint -fingerprint -howdy \
# I DONT CARE ABOUT SPELLING
-spell -aspell -enchant -hunspell -nuspell \
# PRIVACY
-geoip -geoloc -geolocation -geoclue -telemetry -exif -rdp \
# CLOUD CRAP
-onedrive -googledrive -google -aws -cloud -cloudproviders \
# OBSOLETE_HARDWARE
-dvd -dvdr -vcd -dv -cdda -cdinstall -cdr -bluray \
-a52 -css \
# OBSOLETE_LANGUAGE
-fortran -ada -ocaml -java -oracle -ibm -lisp -deprecated -flexiblas -lapacke \
# HARDWARE_DONT_CARE
-scanner -joystick -smartcard -wacom -input_devices_wacom -haptic \
# APPLE
-ipod -ios -ieee1394 -dc1394 -aqua -quicktime -xine -coreaudio -apple \
# PROTOCOLS
-kerberos -ldap -zeroconf -gstreamer -nntp -ipv6 -mpris -mpd \
# ACCESSIBILITY
-accessibility -sox -speex -speech -speechd -scim -ibus -espeak -klatt -mbrola \
# SHELLS I DONT USE
-bash-completion -zsh-completion -fish-completion -bash -zsh -fish -completions \
# EMACS
-emacs -xemacs \
# NO DEBUGGING UNLESS SPECIFIED
-valgrind -unwind -debug -debugger \
# NO LOCAL MAIL
-sendmail -maildir -mbox -imap -smtp \
# JUNK
-startup-notification -chromaprint -kvazaar -snappy -chromecast -libcaca -chromium \
# MISC
-cracklib -lastfm -nas -oci8 -firebird -afs -emboss -berkdb \
# USE WIREGUARD NOT OPENVPN
-openvpn -tun -tap \
# DONT EVER LINK BUSYBOX
-busybox \
# OTHER WINDOW MANAGERS I DONT USE
-niri \
# NEVER COMPRESS MODULES
-modules-compress \
"

